services:
  tourism-app:
    build:
      context: .
      dockerfile: Dockerfile
    image: tourism-app:prod
    container_name: tourism-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3000
    ports:
      - "3000:3000"
    expose:
      - "3000"
    networks:
      - tourismnet

  nginx:
    image: nginx:1.27-alpine
    container_name: tourism-app-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - tourism-app
    networks:
      - tourismnet

networks:
  tourismnet:
    driver: bridge
