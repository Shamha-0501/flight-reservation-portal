services:
  flightportal-app:
    build:
      context: .
      dockerfile: Dockerfile
    image: flightportal-app:prod
    container_name: flightportal-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3000
    ports:
      - "3000:3000"
    expose:
      - "3000"
    networks:
      - flightportalnet

  nginx:
    image: nginx:1.27-alpine
    container_name: flightportal-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - flightportal-app
    networks:
      - flightportalnet

networks:
  flightportalnet:
    driver: bridge
